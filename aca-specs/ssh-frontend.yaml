location: swedencentral
resourceGroup: AdaptiveWardens
type: Microsoft.App/containerApps
name: aw-ssh-frontend
properties:
  environmentId: /subscriptions/7a549bf6-96a8-4af0-8a02-01417c246b57/resourceGroups/AdaptiveWardens/providers/Microsoft.App/managedEnvironments/aw-ca-env
  configuration:
    ingress:
      external: true
      targetPort: 2222
      transport: tcp
    registries:
      - server: awreg8802.azurecr.io
        username: awreg8802
        passwordSecretRef: acr-password
    secrets:
      - name: acr-password
        value: REPLACE_AT_DEPLOY
  template:
    volumes:
      - name: azurefiles
        storageType: AzureFile
        storageName: awdata
    containers:
      - name: ssh-frontend
        image: awreg8802.azurecr.io/ssh-frontend:REPLACE_AT_DEPLOY
        securityContext:
          allowPrivilegeEscalation: false
        resources:
          cpu: 1.0
          memory: 2Gi
        volumeMounts:
          - volumeName: azurefiles
            mountPath: /data
        env:
          - name: PYTHONUNBUFFERED
            value: "1"
          - name: SANDBOX_URL
            value: http://aw-sandbox-store
          - name: AI_ENGINE_URL
            value: http://aw-ai-engine
          - name: DATA_DIR
            value: /data
    scale:
      minReplicas: 1
      maxReplicas: 1
