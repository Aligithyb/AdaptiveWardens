location: swedencentral
resourceGroup: AdaptiveWardens
type: Microsoft.App/containerApps
name: aw-dashboard-frontend
properties:
  environmentId: /subscriptions/7a549bf6-96a8-4af0-8a02-01417c246b57/resourceGroups/AdaptiveWardens/providers/Microsoft.App/managedEnvironments/aw-ca-env
  configuration:
    ingress:
      external: true
      targetPort: 3000
      # ── Azure Front Door WAF ─────────────────────────────────────────
      # This app sits behind Azure Front Door Standard. SOC analysts
      # access the dashboard through the Front Door endpoint (with TLS
      # termination, WAF protection, and DDoS mitigation).
      # The dashboard-backend API calls are routed through the same
      # Front Door origin group (backup origin) or directly via internal
      # ACA networking — NOT exposed to the Internet.
      # ─────────────────────────────────────────────────────────────────
    registries:
      - server: awreg8802.azurecr.io
        username: awreg8802
        passwordSecretRef: acr-password
    secrets:
      - name: acr-password
        value: REPLACE_AT_DEPLOY
      - name: dashboard-api-key
        value: REPLACE_AT_DEPLOY
  template:
    containers:
      - name: dashboard-frontend
        image: awreg8802.azurecr.io/dashboard-frontend:REPLACE_AT_DEPLOY
        securityContext:
          allowPrivilegeEscalation: false
        resources:
          cpu: 0.5
          memory: 1Gi
        env:
          - name: NODE_ENV
            value: production
          - name: NEXT_PUBLIC_API_URL
            value: http://aw-dashboard-backend
          - name: NEXT_PUBLIC_DASHBOARD_API_KEY
            secretRef: dashboard-api-key
    scale:
      minReplicas: 1
      maxReplicas: 2
