# ZAP baseline config — ignores framework-inherent warnings in Next.js compiled JS
# These are not application-level vulnerabilities and cannot be fixed without
# forking the Next.js framework itself.

10027  IGNORE   # Information Disclosure - Suspicious Comments (in node_modules)
10096  IGNORE   # Timestamp Disclosure - Unix (in next.js runtime)
10109  IGNORE   # Modern Web Application (informational only)
10110  IGNORE   # Dangerous JS Functions (in turbopack bundled code)
