name: Azure Container Apps Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      verify_only:
        description: 'Only run health checks — skip build & deploy'
        type: boolean
        default: false
      afd_only:
        description: 'Only deploy/update Front Door + WAF (skip ACA build & deploy)'
        type: boolean
        default: false
      allowed_countries:
        description: 'ISO country codes for geo-filtering (comma-sep, empty=all)'
        type: string
        default: ''

# ── Workflow-level environment variables ─────────────────────────────────────
# All sensitive values come from GitHub Secrets — nothing is hardcoded here.
env:
  AZURE_RG: ${{ secrets.AZURE_RG }}
  AZURE_ACA_ENV: ${{ secrets.AZURE_ACA_ENV }}
  ACR_NAME: ${{ secrets.ACR_NAME }}
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  STORAGE_ACCOUNT: ${{ secrets.STORAGE_ACCOUNT }}
  STORAGE_KEY: ${{ secrets.STORAGE_KEY }}
  FILE_SHARE: ${{ secrets.FILE_SHARE }}
  AZURE_LOCATION: ${{ secrets.AZURE_LOCATION }}
  IMAGE_TAG: ${{ github.sha }}
  # ── Azure Application Gateway WAF ───────────────────────────────────────
  WAF_POLICY_NAME: aw-waf-policy
  APP_GW_NAME: aw-appgw

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 1: SAST — Static Application Security Testing via Semgrep
# ═══════════════════════════════════════════════════════════════════════════════
jobs:
  sast:
    name: Run SAST Scanner (Semgrep)
    if: "!contains(github.event.head_commit.message, '[skip-sec]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: "p/default p/owasp-top-ten"

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 2: DAST — Dynamic Application Security Testing via OWASP ZAP
# ═══════════════════════════════════════════════════════════════════════════════
  dast:
    name: Run DAST Scanner (OWASP ZAP)
    if: "!contains(github.event.head_commit.message, '[skip-sec]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare environment
        run: cp .env.example .env
      - name: Spin up Docker Compose
        run: docker compose up -d --build
      - name: Wait for services
        run: sleep 30
      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:3000'
          fail_action: true
          rules_file_name: '.zap/rules.tsv'

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 3: BUILD — builds all 6 Docker images in parallel and pushes to ACR
# ═══════════════════════════════════════════════════════════════════════════════
  build:
    name: "Build: ${{ matrix.service }}"
    if: ${{ !inputs.verify_only && !inputs.afd_only }}
    needs: [sast, dast]
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - sandbox-store
          - ai-engine
          - ssh-frontend
          - http-frontend
          - dashboard-backend
          - dashboard-frontend
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push ${{ matrix.service }}
        run: |
          docker build \
            -t ${{ env.ACR_LOGIN_SERVER }}/${{ matrix.service }}:${{ env.IMAGE_TAG }} \
            -t ${{ env.ACR_LOGIN_SERVER }}/${{ matrix.service }}:latest \
            ./${{ matrix.service }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ matrix.service }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ matrix.service }}:latest

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 4: DEPLOY — deploys all 6 services in dependency order
# ═══════════════════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to Azure Container Apps
    needs: [build]
    if: ${{ always() && !cancelled() && !inputs.verify_only && !inputs.afd_only }}
    runs-on: ubuntu-latest
    concurrency: aca-deploy   # prevents parallel deploys from conflicting

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure VNET and ACA Environment (required for external TCP ingress)
        run: |
          RG="${{ env.AZURE_RG }}"
          ACA_ENV="${{ env.AZURE_ACA_ENV }}"
          VNET_NAME="aw-aca-vnet"
          SUBNET_NAME="aca-infra-subnet"

          # Use the existing ACA environment's location (avoids Azure policy region restrictions)
          LOCATION=$(az containerapp env show --name "$ACA_ENV" --resource-group "$RG" \
            --query location -o tsv 2>/dev/null || echo "swedencentral")

          echo "Using location: $LOCATION"

          # Create VNet if missing
          if ! az network vnet show --name "$VNET_NAME" --resource-group "$RG" &>/dev/null; then
            echo "Creating VNet..."
            az network vnet create \
              --resource-group "$RG" \
              --name "$VNET_NAME" \
              --location "$LOCATION" \
              --address-prefix "10.2.0.0/16" \
              --output none
            echo "VNet created."
          fi

          # Create delegated subnet if missing
          SUBNET_ID=$(az network vnet subnet show \
            --name "$SUBNET_NAME" \
            --vnet-name "$VNET_NAME" \
            --resource-group "$RG" \
            --query id -o tsv 2>/dev/null || echo "")
          if [ -z "$SUBNET_ID" ]; then
            echo "Creating delegated subnet..."
            az network vnet subnet create \
              --resource-group "$RG" \
              --vnet-name "$VNET_NAME" \
              --name "$SUBNET_NAME" \
              --address-prefix "10.2.0.0/23" \
              --delegations "Microsoft.App/environments" \
              --output none
            SUBNET_ID=$(az network vnet subnet show \
              --name "$SUBNET_NAME" \
              --vnet-name "$VNET_NAME" \
              --resource-group "$RG" \
              --query id -o tsv)
            echo "Subnet created."
          fi

          # Ensure ACA environment has VNET
          if az containerapp env show --name "$ACA_ENV" --resource-group "$RG" &>/dev/null; then
            HAS_VNET=$(az containerapp env show --name "$ACA_ENV" --resource-group "$RG" \
              --query "properties.vnetConfiguration.infrastructureSubnetId" -o tsv 2>/dev/null || echo "")
            if [ -z "$HAS_VNET" ]; then
              echo "ACA env exists without VNET. Recreating..."
              for APP in aw-sandbox-store aw-ai-engine aw-dashboard-backend aw-ssh-frontend aw-http-frontend aw-dashboard-frontend; do
                az containerapp delete --name "$APP" --resource-group "$RG" --yes --output none 2>/dev/null || true
              done
              az containerapp env delete --name "$ACA_ENV" --resource-group "$RG" --yes --output none
              az containerapp env create \
                --resource-group "$RG" \
                --name "$ACA_ENV" \
                --location "$LOCATION" \
                --infrastructure-subnet-resource-id "$SUBNET_ID" \
                --tags Project=AdaptiveWardens \
                --output none
              echo "ACA env recreated with VNET."
            else
              echo "ACA env already has VNET."
            fi
          else
            echo "Creating ACA environment with VNET..."
            az containerapp env create \
              --resource-group "$RG" \
              --name "$ACA_ENV" \
              --location "$LOCATION" \
              --infrastructure-subnet-resource-id "$SUBNET_ID" \
              --tags Project=AdaptiveWardens \
              --output none
            echo "ACA environment created with VNET."
          fi

      - name: Register Azure File Share with ACA Environment
        run: |
          az containerapp env storage set \
            --name "${{ env.AZURE_ACA_ENV }}" \
            --resource-group "${{ env.AZURE_RG }}" \
            --storage-name awdata \
            --azure-file-account-name "${{ env.STORAGE_ACCOUNT }}" \
            --azure-file-account-key "${{ env.STORAGE_KEY }}" \
            --azure-file-share-name "${{ env.FILE_SHARE }}" \
            --access-mode ReadWrite \
            --output none

      - name: "Deploy [1/6]: sandbox-store"
        run: |
          az rest \
            --method PUT \
            --url "https://management.azure.com/subscriptions/7a549bf6-96a8-4af0-8a02-01417c246b57/resourceGroups/AdaptiveWardens/providers/Microsoft.App/containerApps/aw-sandbox-store?api-version=2024-03-01" \
            --headers "Content-Type=application/json" \
            --body '{
              "location": "swedencentral",
              "properties": {
                "environmentId": "/subscriptions/7a549bf6-96a8-4af0-8a02-01417c246b57/resourceGroups/AdaptiveWardens/providers/Microsoft.App/managedEnvironments/aw-ca-env",
                "configuration": {
                  "ingress": { "external": false, "targetPort": 8001 },
                  "registries": [{ "server": "awreg8802.azurecr.io", "username": "awreg8802", "passwordSecretRef": "acr-password" }],
                  "secrets": [
                    { "name": "acr-password", "value": "${{ secrets.ACR_PASSWORD }}" },
                    { "name": "slack-webhook-url", "value": "${{ secrets.SLACK_WEBHOOK_URL }}" },
                    { "name": "slack-bot-token", "value": "${{ secrets.SLACK_BOT_TOKEN }}" },
                    { "name": "slack-channel", "value": "${{ secrets.SLACK_CHANNEL }}" },
                    { "name": "canary-aws-access-key", "value": "${{ secrets.CANARY_AWS_ACCESS_KEY }}" },
                    { "name": "canary-aws-secret-key", "value": "${{ secrets.CANARY_AWS_SECRET_KEY }}" },
                    { "name": "canary-stripe-key", "value": "${{ secrets.CANARY_STRIPE_KEY }}" },
                    { "name": "canary-dns-hostname", "value": "${{ secrets.CANARY_DNS_HOSTNAME }}" }
                  ]
                },
                "template": {
                  "volumes": [{ "name": "azurefiles", "storageType": "AzureFile", "storageName": "awdata" }],
                  "containers": [{
                    "name": "sandbox-store",
                    "image": "awreg8802.azurecr.io/sandbox-store:${{ env.IMAGE_TAG }}",
                    "resources": { "cpu": 0.5, "memory": "1Gi" },
                    "volumeMounts": [{ "volumeName": "azurefiles", "mountPath": "/data" }],
                    "env": [
                      { "name": "PYTHONUNBUFFERED", "value": "1" },
                      { "name": "DB_PATH", "value": "/data/app_state.db" },
                      { "name": "SLACK_WEBHOOK_URL", "secretRef": "slack-webhook-url" },
                      { "name": "SLACK_BOT_TOKEN", "secretRef": "slack-bot-token" },
                      { "name": "SLACK_CHANNEL", "secretRef": "slack-channel" },
                      { "name": "CANARY_AWS_ACCESS_KEY", "secretRef": "canary-aws-access-key" },
                      { "name": "CANARY_AWS_SECRET_KEY", "secretRef": "canary-aws-secret-key" },
                      { "name": "CANARY_STRIPE_KEY", "secretRef": "canary-stripe-key" },
                      { "name": "CANARY_DNS_HOSTNAME", "secretRef": "canary-dns-hostname" }
                    ]
                  }],
                  "scale": { "minReplicas": 1, "maxReplicas": 1 }
                }
              }
            }'

      - name: "Wait for sandbox-store"
        run: |
          for i in $(seq 1 30); do
            STATUS=$(az containerapp show --name aw-sandbox-store \
              --resource-group AdaptiveWardens \
              --query properties.provisioningState -o tsv 2>/dev/null || echo "Pending")
            echo "Attempt $i/30 — $STATUS"
            [ "$STATUS" = "Succeeded" ] && echo "Ready." && break
            [ "$STATUS" = "Failed" ] && az containerapp logs show --name aw-sandbox-store --resource-group AdaptiveWardens --tail 50 && exit 1
            [ "$i" = "30" ] && exit 1
            sleep 10
          done

      - name: "Deploy [2/6]: ai-engine"
        run: |
          az rest \
            --method PUT \
            --url "https://management.azure.com/subscriptions/7a549bf6-96a8-4af0-8a02-01417c246b57/resourceGroups/AdaptiveWardens/providers/Microsoft.App/containerApps/aw-ai-engine?api-version=2024-03-01" \
            --headers "Content-Type=application/json" \
            --body '{
              "location": "swedencentral",
              "properties": {
                "environmentId": "/subscriptions/7a549bf6-96a8-4af0-8a02-01417c246b57/resourceGroups/AdaptiveWardens/providers/Microsoft.App/managedEnvironments/aw-ca-env",
                "configuration": {
                  "ingress": { "external": false, "targetPort": 8002 },
                  "registries": [{ "server": "awreg8802.azurecr.io", "username": "awreg8802", "passwordSecretRef": "acr-password" }],
                  "secrets": [
                    { "name": "acr-password", "value": "${{ secrets.ACR_PASSWORD }}" },
                    { "name": "deepseek-api-key", "value": "${{ secrets.DEEPSEEK_API_KEY }}" },
                    { "name": "deepseek-model", "value": "${{ secrets.DEEPSEEK_MODEL }}" },
                    { "name": "deepseek-base-url", "value": "${{ secrets.DEEPSEEK_BASE_URL }}" },
                    { "name": "llm-input-budget", "value": "${{ secrets.LLM_DAILY_INPUT_TOKEN_BUDGET }}" },
                    { "name": "llm-output-budget", "value": "${{ secrets.LLM_DAILY_OUTPUT_TOKEN_BUDGET }}" },
                    { "name": "llm-rate-calls", "value": "${{ secrets.LLM_PER_IP_RATE_LIMIT_CALLS }}" },
                    { "name": "llm-rate-window", "value": "${{ secrets.LLM_PER_IP_RATE_LIMIT_WINDOW }}" }
                  ]
                },
                "template": {
                  "volumes": [{ "name": "azurefiles", "storageType": "AzureFile", "storageName": "awdata" }],
                  "containers": [{
                    "name": "ai-engine",
                    "image": "awreg8802.azurecr.io/ai-engine:${{ env.IMAGE_TAG }}",
                    "resources": { "cpu": 1.0, "memory": "2Gi" },
                    "volumeMounts": [{ "volumeName": "azurefiles", "mountPath": "/data" }],
                    "env": [
                      { "name": "PYTHONUNBUFFERED", "value": "1" },
                      { "name": "SANDBOX_URL", "value": "http://aw-sandbox-store" },
                      { "name": "DEEPSEEK_API_KEY", "secretRef": "deepseek-api-key" },
                      { "name": "DEEPSEEK_MODEL", "secretRef": "deepseek-model" },
                      { "name": "DEEPSEEK_BASE_URL", "secretRef": "deepseek-base-url" },
                      { "name": "LLM_DAILY_INPUT_TOKEN_BUDGET", "secretRef": "llm-input-budget" },
                      { "name": "LLM_DAILY_OUTPUT_TOKEN_BUDGET", "secretRef": "llm-output-budget" },
                      { "name": "LLM_PER_IP_RATE_LIMIT_CALLS", "secretRef": "llm-rate-calls" },
                      { "name": "LLM_PER_IP_RATE_LIMIT_WINDOW", "secretRef": "llm-rate-window" }
                    ]
                  }],
                  "scale": { "minReplicas": 1, "maxReplicas": 1 }
                }
              }
            }'

      - name: "Wait for ai-engine"
        run: |
          for i in $(seq 1 30); do
            STATUS=$(az containerapp show --name aw-ai-engine \
              --resource-group AdaptiveWardens \
              --query properties.provisioningState -o tsv 2>/dev/null || echo "Pending")
            echo "Attempt $i/30 — $STATUS"
            [ "$STATUS" = "Succeeded" ] && echo "Ready." && break
            [ "$STATUS" = "Failed" ] && az containerapp logs show --name aw-ai-engine --resource-group AdaptiveWardens --tail 50 && exit 1
            [ "$i" = "30" ] && exit 1
            sleep 10
          done

      - name: "Deploy [3/6]: dashboard-backend"
        run: |
          az rest \
            --method PUT \
            --url "https://management.azure.com/subscriptions/7a549bf6-96a8-4af0-8a02-01417c246b57/resourceGroups/AdaptiveWardens/providers/Microsoft.App/containerApps/aw-dashboard-backend?api-version=2024-03-01" \
            --headers "Content-Type=application/json" \
            --body '{
              "location": "swedencentral",
              "properties": {
                "environmentId": "/subscriptions/7a549bf6-96a8-4af0-8a02-01417c246b57/resourceGroups/AdaptiveWardens/providers/Microsoft.App/managedEnvironments/aw-ca-env",
                "configuration": {
                  "ingress": { "external": false, "targetPort": 8003 },
                  "registries": [{ "server": "awreg8802.azurecr.io", "username": "awreg8802", "passwordSecretRef": "acr-password" }],
                  "secrets": [
                    { "name": "acr-password", "value": "${{ secrets.ACR_PASSWORD }}" },
                    { "name": "dashboard-api-key", "value": "${{ secrets.DASHBOARD_API_KEY }}" }
                  ]
                },
                "template": {
                  "volumes": [{ "name": "azurefiles", "storageType": "AzureFile", "storageName": "awdata" }],
                  "containers": [{
                    "name": "dashboard-backend",
                    "image": "awreg8802.azurecr.io/dashboard-backend:${{ env.IMAGE_TAG }}",
                    "resources": { "cpu": 0.5, "memory": "1Gi" },
                    "volumeMounts": [{ "volumeName": "azurefiles", "mountPath": "/data" }],
                    "env": [
                      { "name": "PYTHONUNBUFFERED", "value": "1" },
                      { "name": "DB_PATH", "value": "/data/app_state.db" },
                      { "name": "DASHBOARD_API_KEY", "secretRef": "dashboard-api-key" }
                    ]
                  }],
                  "scale": { "minReplicas": 1, "maxReplicas": 1 }
                }
              }
            }'

      - name: "Wait for dashboard-backend"
        run: |
          for i in $(seq 1 30); do
            STATUS=$(az containerapp show --name aw-dashboard-backend \
              --resource-group AdaptiveWardens \
              --query properties.provisioningState -o tsv 2>/dev/null || echo "Pending")
            echo "Attempt $i/30 — $STATUS"
            [ "$STATUS" = "Succeeded" ] && echo "Ready." && break
            [ "$STATUS" = "Failed" ] && az containerapp logs show --name aw-dashboard-backend --resource-group AdaptiveWardens --tail 50 && exit 1
            [ "$i" = "30" ] && exit 1
            sleep 10
          done

      - name: "Deploy [4/6]: ssh-frontend"
        run: |
          az rest \
            --method PUT \
            --url "https://management.azure.com/subscriptions/7a549bf6-96a8-4af0-8a02-01417c246b57/resourceGroups/AdaptiveWardens/providers/Microsoft.App/containerApps/aw-ssh-frontend?api-version=2024-03-01" \
            --headers "Content-Type=application/json" \
            --body '{
              "location": "swedencentral",
              "properties": {
                "environmentId": "/subscriptions/7a549bf6-96a8-4af0-8a02-01417c246b57/resourceGroups/AdaptiveWardens/providers/Microsoft.App/managedEnvironments/aw-ca-env",
                "configuration": {
                  "ingress": { "external": true, "targetPort": 2222, "transport": "tcp" },
                  "registries": [{ "server": "awreg8802.azurecr.io", "username": "awreg8802", "passwordSecretRef": "acr-password" }],
                  "secrets": [
                    { "name": "acr-password", "value": "${{ secrets.ACR_PASSWORD }}" }
                  ]
                },
                "template": {
                  "volumes": [{ "name": "azurefiles", "storageType": "AzureFile", "storageName": "awdata" }],
                  "containers": [{
                    "name": "ssh-frontend",
                    "image": "awreg8802.azurecr.io/ssh-frontend:${{ env.IMAGE_TAG }}",
                    "resources": { "cpu": 1.0, "memory": "2Gi" },
                    "volumeMounts": [{ "volumeName": "azurefiles", "mountPath": "/data" }],
                    "env": [
                      { "name": "PYTHONUNBUFFERED", "value": "1" },
                      { "name": "SANDBOX_URL", "value": "http://aw-sandbox-store" },
                      { "name": "AI_ENGINE_URL", "value": "http://aw-ai-engine" },
                      { "name": "DATA_DIR", "value": "/data" }
                    ]
                  }],
                  "scale": { "minReplicas": 1, "maxReplicas": 1 }
                }
              }
            }'

      - name: "Wait for ssh-frontend"
        run: |
          for i in $(seq 1 30); do
            STATUS=$(az containerapp show --name aw-ssh-frontend \
              --resource-group AdaptiveWardens \
              --query properties.provisioningState -o tsv 2>/dev/null || echo "Pending")
            echo "Attempt $i/30 — $STATUS"
            [ "$STATUS" = "Succeeded" ] && echo "Ready." && break
            [ "$STATUS" = "Failed" ] && az containerapp logs show --name aw-ssh-frontend --resource-group AdaptiveWardens --tail 50 && exit 1
            [ "$i" = "30" ] && exit 1
            sleep 10
          done

      - name: "Deploy [5/6]: http-frontend"
        run: |
          az rest \
            --method PUT \
            --url "https://management.azure.com/subscriptions/7a549bf6-96a8-4af0-8a02-01417c246b57/resourceGroups/AdaptiveWardens/providers/Microsoft.App/containerApps/aw-http-frontend?api-version=2024-03-01" \
            --headers "Content-Type=application/json" \
            --body '{
              "location": "swedencentral",
              "properties": {
                "environmentId": "/subscriptions/7a549bf6-96a8-4af0-8a02-01417c246b57/resourceGroups/AdaptiveWardens/providers/Microsoft.App/managedEnvironments/aw-ca-env",
                "configuration": {
                  "ingress": { "external": true, "targetPort": 8080, "transport": "auto" },
                  "registries": [{ "server": "awreg8802.azurecr.io", "username": "awreg8802", "passwordSecretRef": "acr-password" }],
                  "secrets": [
                    { "name": "acr-password", "value": "${{ secrets.ACR_PASSWORD }}" }
                  ]
                },
                "template": {
                  "containers": [{
                    "name": "http-frontend",
                    "image": "awreg8802.azurecr.io/http-frontend:${{ env.IMAGE_TAG }}",
                    "resources": { "cpu": 0.5, "memory": "1Gi" },
                    "env": [
                      { "name": "PYTHONUNBUFFERED", "value": "1" },
                      { "name": "SANDBOX_URL", "value": "http://aw-sandbox-store" },
                      { "name": "AI_ENGINE_URL", "value": "http://aw-ai-engine" }
                    ]
                  }],
                  "scale": { "minReplicas": 1, "maxReplicas": 2 }
                }
              }
            }'

      - name: "Wait for http-frontend"
        run: |
          for i in $(seq 1 30); do
            STATUS=$(az containerapp show --name aw-http-frontend \
              --resource-group AdaptiveWardens \
              --query properties.provisioningState -o tsv 2>/dev/null || echo "Pending")
            echo "Attempt $i/30 — $STATUS"
            [ "$STATUS" = "Succeeded" ] && echo "Ready." && break
            [ "$STATUS" = "Failed" ] && az containerapp logs show --name aw-http-frontend --resource-group AdaptiveWardens --tail 50 && exit 1
            [ "$i" = "30" ] && exit 1
            sleep 10
          done

      - name: "Deploy [6/6]: dashboard-frontend"
        run: |
          az rest \
            --method PUT \
            --url "https://management.azure.com/subscriptions/7a549bf6-96a8-4af0-8a02-01417c246b57/resourceGroups/AdaptiveWardens/providers/Microsoft.App/containerApps/aw-dashboard-frontend?api-version=2024-03-01" \
            --headers "Content-Type=application/json" \
            --body '{
              "location": "swedencentral",
              "properties": {
                "environmentId": "/subscriptions/7a549bf6-96a8-4af0-8a02-01417c246b57/resourceGroups/AdaptiveWardens/providers/Microsoft.App/managedEnvironments/aw-ca-env",
                "configuration": {
                  "ingress": { "external": true, "targetPort": 3000, "transport": "auto" },
                  "registries": [{ "server": "awreg8802.azurecr.io", "username": "awreg8802", "passwordSecretRef": "acr-password" }],
                  "secrets": [
                    { "name": "acr-password", "value": "${{ secrets.ACR_PASSWORD }}" },
                    { "name": "dashboard-api-key", "value": "${{ secrets.DASHBOARD_API_KEY }}" }
                  ]
                },
                "template": {
                  "containers": [{
                    "name": "dashboard-frontend",
                    "image": "awreg8802.azurecr.io/dashboard-frontend:${{ env.IMAGE_TAG }}",
                    "resources": { "cpu": 0.5, "memory": "1Gi" },
                    "env": [
                      { "name": "NODE_ENV", "value": "production" },
                      { "name": "NEXT_PUBLIC_API_URL", "value": "http://aw-dashboard-backend" },
                      { "name": "NEXT_PUBLIC_DASHBOARD_API_KEY", "secretRef": "dashboard-api-key" }
                    ]
                  }],
                  "scale": { "minReplicas": 1, "maxReplicas": 2 }
                }
              }
            }'

      - name: "Wait for dashboard-frontend"
        run: |
          for i in $(seq 1 30); do
            STATUS=$(az containerapp show --name aw-dashboard-frontend \
              --resource-group AdaptiveWardens \
              --query properties.provisioningState -o tsv 2>/dev/null || echo "Pending")
            echo "Attempt $i/30 — $STATUS"
            [ "$STATUS" = "Succeeded" ] && echo "Ready." && break
            [ "$STATUS" = "Failed" ] && az containerapp logs show --name aw-dashboard-frontend --resource-group AdaptiveWardens --tail 50 && exit 1
            [ "$i" = "30" ] && exit 1
            sleep 10
          done

      # ═══════════════════════════════════════════════════════════════════════════
      # APPLICATION GATEWAY WAF DEPLOYMENT
      # ═══════════════════════════════════════════════════════════════════════════

      - name: Capture ACA FQDNs for App Gateway backends
        run: |
          HTTP_FQDN=$(az containerapp show --name aw-http-frontend \
            --resource-group AdaptiveWardens \
            --query properties.configuration.ingress.fqdn -o tsv 2>/dev/null || echo "")
          DASH_FQDN=$(az containerapp show --name aw-dashboard-frontend \
            --resource-group AdaptiveWardens \
            --query properties.configuration.ingress.fqdn -o tsv 2>/dev/null || echo "")
          echo "HTTP_FQDN=$HTTP_FQDN" >> $GITHUB_ENV
          echo "DASH_FQDN=$DASH_FQDN" >> $GITHUB_ENV
          echo "Captured FQDNs:"
          echo "  http-frontend:      $HTTP_FQDN"
          echo "  dashboard-frontend: $DASH_FQDN"

      - name: Deploy Application Gateway WAF (Bicep)
        env:
          ALLOWED_COUNTRIES: ${{ inputs.allowed_countries }}
        run: |
          COUNTRIES="$ALLOWED_COUNTRIES"
          if [ -z "$COUNTRIES" ]; then
            COUNTRIES_JSON="[]"
          else
            COUNTRIES_JSON=$(echo "$COUNTRIES" | awk -F, '{for(i=1;i<=NF;i++){printf "\"%s\"",$i; if(i<NF)printf ","}}' | sed 's/^/[/;s/$/]/')
          fi

          az deployment group create \
            --resource-group "${{ env.AZURE_RG }}" \
            --template-file infra/afd-waf.bicep \
            --parameters \
              wafPolicyName="${{ env.WAF_POLICY_NAME }}" \
              appGwName="${{ env.APP_GW_NAME }}" \
              location="swedencentral" \
              httpFrontendFqdn="$HTTP_FQDN" \
              dashboardFrontendFqdn="$DASH_FQDN" \
              allowedCountries="${COUNTRIES_JSON}" \
            --output none
          echo "Application Gateway WAF deployed."

      - name: Retrieve App Gateway public IP
        run: |
          GW_IP=$(az network public-ip show \
            --name "${APP_GW_NAME}-pip" \
            --resource-group "${{ env.AZURE_RG }}" \
            --query ipAddress -o tsv 2>/dev/null || echo "unavailable")
          echo "GW_IP=$GW_IP" >> $GITHUB_ENV
          echo "Application Gateway public IP: $GW_IP"

      - name: Print deployment summary
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Azure Container Apps" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          for APP in aw-sandbox-store aw-ai-engine aw-dashboard-backend; do
            echo "| $APP | internal only |" >> $GITHUB_STEP_SUMMARY
          done
          for APP in aw-http-frontend aw-dashboard-frontend; do
            FQDN=$(az containerapp show --name "$APP" --resource-group AdaptiveWardens \
              --query properties.configuration.ingress.fqdn -o tsv 2>/dev/null || echo "unavailable")
            echo "| $APP | https://$FQDN (ACA origin) |" >> $GITHUB_STEP_SUMMARY
          done
          SSH_FQDN=$(az containerapp show --name aw-ssh-frontend --resource-group AdaptiveWardens \
            --query properties.configuration.ingress.fqdn -o tsv 2>/dev/null || echo "unavailable")
          echo "| aw-ssh-frontend | $SSH_FQDN:2222 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Application Gateway WAF" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Public IP | Backend | Protection |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| HTTP Honeypot | http://${{ env.GW_IP }} | ${{ env.HTTP_FQDN }}:443 | OWASP CRS 3.2, Geo-filter, Suspicious UA/Sensor block |" >> $GITHUB_STEP_SUMMARY
          echo "| SOC Dashboard | http://${{ env.GW_IP }} | ${{ env.DASH_FQDN }}:443 | OWASP CRS 3.2, Geo-filter, Suspicious UA/Sensor block |" >> $GITHUB_STEP_SUMMARY
          cat $GITHUB_STEP_SUMMARY

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 5: COMPLIANCE — deploy compliance policies + collect evidence
# Runs after deploy succeeds. Non-blocking — does not affect deploy outcome.
# Collects evidence for SOC 2, ISO 27001, NIST SP 800-53.
# ═══════════════════════════════════════════════════════════════════════════════
  compliance:
    name: Compliance Evidence Collection
    needs: [deploy]
    if: ${{ always() && !cancelled() && !inputs.verify_only && !inputs.afd_only && needs.deploy.result == 'success' }}
    runs-on: ubuntu-latest
    concurrency: aca-deploy

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Enable Defender for Cloud (CSPM Standard)
        continue-on-error: true
        run: |
          echo "Enabling Defender for Cloud pricing plans..."
          az security pricing create --name 'CloudPosture' --pricing-tier 'Standard' 2>/dev/null || echo "  (requires subscription-level permissions — non-blocking)"
          az security pricing create --name 'Containers' --pricing-tier 'Standard' 2>/dev/null || echo "  (optional)"
          az security pricing create --name 'StorageAccounts' --pricing-tier 'Standard' 2>/dev/null || echo "  (optional)"
          az security pricing create --name 'KeyVaults' --pricing-tier 'Standard' 2>/dev/null || echo "  (optional)"
          echo "Defender for Cloud enabled (or already enabled)."

      - name: Deploy compliance infrastructure
        continue-on-error: true
        run: |
          RG="${{ env.AZURE_RG }}"
          LA_NAME="${{ secrets.AZURE_LOG_ANALYTICS }}"
          STORAGE="${{ env.STORAGE_ACCOUNT }}"
          KV_NAME="${{ secrets.KEY_VAULT }}"

          echo "--- Log Analytics: 365-day retention ---"
          az monitor log-analytics workspace update \
            --resource-group "$RG" \
            --workspace-name "$LA_NAME" \
            --retention-time 365 \
            --output none 2>/dev/null || echo "  (skipped)"

          echo "--- Storage Account: diagnostic settings ---"
          LA_ID=$(az monitor log-analytics workspace show \
            --resource-group "$RG" \
            --workspace-name "$LA_NAME" \
            --query id -o tsv 2>/dev/null || echo "")
          if [ -n "$LA_ID" ]; then
            az monitor diagnostic-settings create \
              --name "aw-compliance-diag" \
              --resource "$(az storage account show --name "$STORAGE" --resource-group "$RG" --query id -o tsv 2>/dev/null)" \
              --workspace "$LA_ID" \
              --logs '[{"category":"StorageRead","enabled":true,"retentionPolicy":{"enabled":true,"days":365}},{"category":"StorageWrite","enabled":true,"retentionPolicy":{"enabled":true,"days":365}},{"category":"StorageDelete","enabled":true,"retentionPolicy":{"enabled":true,"days":365}}]' \
              --metrics '[{"category":"Transaction","enabled":true,"retentionPolicy":{"enabled":true,"days":365}}]' \
              --output none 2>/dev/null || echo "  (skipped)"
          else
            echo "  (Log Analytics workspace not found)"
          fi

          echo "--- Key Vault: diagnostic settings ---"
          if [ -n "$LA_ID" ] && [ -n "$KV_NAME" ]; then
            az monitor diagnostic-settings create \
              --name "aw-compliance-diag" \
              --resource "$(az keyvault show --name "$KV_NAME" --resource-group "$RG" --query id -o tsv 2>/dev/null)" \
              --workspace "$LA_ID" \
              --logs '[{"category":"AuditEvent","enabled":true,"retentionPolicy":{"enabled":true,"days":365}}]' \
              --metrics '[{"category":"AllMetrics","enabled":true,"retentionPolicy":{"enabled":true,"days":365}}]' \
              --output none 2>/dev/null || echo "  (skipped)"
          fi

          echo "Compliance infrastructure configured."

      - name: Assign Azure Policy initiatives (requires Resource Policy Contributor)
        continue-on-error: true
        run: |
          echo "Attempting to assign ISO 27001:2013 policy initiative..."
          az policy assignment create \
            --name "iso27001-aw" \
            --display-name "ISO 27001:2013 - AdaptiveWardens" \
            --policy-set-definition "1f3afdf9-d0c9-4c3d-847f-89da613e70a8" \
            --resource-group "${{ env.AZURE_RG }}" \
            --enforcement-mode DoNotEnforce \
            --output none 2>/dev/null || echo "  (skipped — needs Resource Policy Contributor role)"

          echo "Attempting to assign SOC 2 Type II policy initiative..."
          az policy assignment create \
            --name "soc2-aw" \
            --display-name "SOC 2 Type II - AdaptiveWardens" \
            --policy-set-definition "e64b2e1b-9a07-4bb6-9e0f-982a36b8cb91" \
            --resource-group "${{ env.AZURE_RG }}" \
            --enforcement-mode DoNotEnforce \
            --output none 2>/dev/null || echo "  (skipped — needs Resource Policy Contributor role)"

          echo "Attempting to assign NIST SP 800-53 Rev. 5 policy initiative..."
          az policy assignment create \
            --name "nist80053-aw" \
            --display-name "NIST SP 800-53 Rev. 5 - AdaptiveWardens" \
            --policy-set-definition "179d1daa-458f-4e47-8086-2a68d0d6c38f" \
            --resource-group "${{ env.AZURE_RG }}" \
            --enforcement-mode DoNotEnforce \
            --output none 2>/dev/null || echo "  (skipped — needs Resource Policy Contributor role)"

          echo "Policy assignments attempted."

      - name: Run compliance evidence collection (Azure infra)
        continue-on-error: true
        run: |
          chmod +x scripts/collect-compliance-evidence.sh
          bash scripts/collect-compliance-evidence.sh

      - name: Run codebase compliance scanner
        continue-on-error: true
        run: |
          chmod +x scripts/compliance-scanner.sh
          bash scripts/compliance-scanner.sh "${{ github.workspace }}"

      - name: Upload compliance evidence to Azure Storage
        continue-on-error: true
        if: ${{ env.STORAGE_ACCOUNT != '' }}
        run: |
          STORAGE="${{ env.STORAGE_ACCOUNT }}"
          RG="${{ env.AZURE_RG }}"
          STORAGE_KEY=$(az storage account keys list --resource-group "$RG" --account-name "$STORAGE" --query "[0].value" -o tsv 2>/dev/null || echo "")
          if [ -n "$STORAGE_KEY" ]; then
            az storage container create \
              --name "compliance-evidence" \
              --account-name "$STORAGE" \
              --account-key "$STORAGE_KEY" \
              --public-access off \
              --output none 2>/dev/null || true
            az storage blob upload-batch \
              --account-name "$STORAGE" \
              --account-key "$STORAGE_KEY" \
              --destination "compliance-evidence" \
              --source "./compliance-evidence" \
              --overwrite
            az storage blob upload \
              --account-name "$STORAGE" \
              --account-key "$STORAGE_KEY" \
              --container-name "compliance-evidence" \
              --file "./compliance-report.json" \
              --name "compliance-report-${{ env.IMAGE_TAG }}.json" \
              --overwrite
            echo "Evidence uploaded to compliance-evidence/ container."
          else
            echo "Could not retrieve storage key — skipping upload."
          fi

      # ── Compliance Summary for GitHub Step Summary ──
      - name: Generate Compliance Summary
        run: |
          REPORT="./compliance-report.json"
          if [ -f "$REPORT" ]; then
            echo "## AdaptiveWardens Compliance Scorecard" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            SCORE=$(jq -r '.summary.overallScore' "$REPORT")
            PASSED=$(jq -r '.summary.passed' "$REPORT")
            TOTAL=$(jq -r '.summary.totalControls' "$REPORT")
            echo "**Overall Codebase Compliance: $PASSED / $TOTAL controls passed ($SCORE%)**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            echo "| Standard | Passed | Total | Score |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|---|---|" >> $GITHUB_STEP_SUMMARY

            NIST_P=$(jq -r '.standards.nistSP80053.passed' "$REPORT")
            NIST_T=$(jq -r '.standards.nistSP80053.total' "$REPORT")
            NIST_S=$(jq -r '.standards.nistSP80053.score' "$REPORT")
            echo "| NIST SP 800-53 Rev. 5 | $NIST_P | $NIST_T | $NIST_S% |" >> $GITHUB_STEP_SUMMARY

            GDPR_P=$(jq -r '.standards.gdpr.passed' "$REPORT")
            GDPR_T=$(jq -r '.standards.gdpr.total' "$REPORT")
            GDPR_S=$(jq -r '.standards.gdpr.score' "$REPORT")
            echo "| GDPR | $GDPR_P | $GDPR_T | $GDPR_S% |" >> $GITHUB_STEP_SUMMARY

            SOC2_P=$(jq -r '.standards.soc2TypeII.passed' "$REPORT")
            SOC2_T=$(jq -r '.standards.soc2TypeII.total' "$REPORT")
            SOC2_S=$(jq -r '.standards.soc2TypeII.score' "$REPORT")
            echo "| SOC 2 Type II | $SOC2_P | $SOC2_T | $SOC2_S% |" >> $GITHUB_STEP_SUMMARY

            ISO_P=$(jq -r '.standards.iso27001.passed' "$REPORT")
            ISO_T=$(jq -r '.standards.iso27001.total' "$REPORT")
            ISO_S=$(jq -r '.standards.iso27001.score' "$REPORT")
            echo "| ISO 27001:2013 | $ISO_P | $ISO_T | $ISO_S% |" >> $GITHUB_STEP_SUMMARY

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Failed Controls" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| ID | Name | Category |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
            jq -r '.controls[] | select(.status == "FAIL") | "\(.id)|\(.name)|\(.category)"' "$REPORT" >> $GITHUB_STEP_SUMMARY

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Full report saved to \`compliance-report.json\` and uploaded to Azure Storage." >> $GITHUB_STEP_SUMMARY
          else
            echo "No compliance report found." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check for non-compliant resources (Azure Policy)
        continue-on-error: true
        run: |
          NON_COMPLIANT=$(az policy state list --resource-group "${{ env.AZURE_RG }}" \
            --filter "complianceState eq 'NonCompliant'" \
            --query "length(@)" -o tsv 2>/dev/null || echo "0")
          if [ "$NON_COMPLIANT" -gt 0 ]; then
            echo "⚠️  $NON_COMPLIANT non-compliant resource(s) found." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Resource | Policy | Effect |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|--------|--------|" >> $GITHUB_STEP_SUMMARY
            az policy state list --resource-group "${{ env.AZURE_RG }}" \
              --filter "complianceState eq 'NonCompliant'" \
              --query "[].{resource:resourceId, policy:policyDefinitionName, effect:effect}" \
              -o tsv 2>/dev/null | while IFS=$'\t' read -r resource policy effect; do
              echo "| $resource | $policy | $effect |" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "✓ All Azure resources compliant (or no policies assigned)." >> $GITHUB_STEP_SUMMARY
          fi
          cat $GITHUB_STEP_SUMMARY

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 6: IaC DRIFT DETECTION & AUTO-REMEDIATION
# Runs after compliance. Checks every Azure resource against its desired state
# defined in Bicep templates, azure-setup.sh, and workflow config. Auto-remediates
# where possible (WAF mode, diagnostic settings, retention, Defender plans).
# ═══════════════════════════════════════════════════════════════════════════════
  iac-drift:
    name: IaC Drift Detection & Remediation
    needs: [deploy]
    if: ${{ always() && !cancelled() && !inputs.verify_only && !inputs.afd_only && needs.deploy.result == 'success' }}
    runs-on: ubuntu-latest

    outputs:
      drift_detected: ${{ steps.drift-summary.outputs.drift_detected }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ── Helper: generate consistent timestamp for report ──
      - name: Set environment variables
        run: |
          echo "TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV
          echo "DRIFT_REPORT=/tmp/drift-report.json" >> $GITHUB_ENV
          echo "DRIFT_COUNT=0" >> $GITHUB_ENV
          echo "REMEDIATED_COUNT=0" >> $GITHUB_ENV

      # ═══════════════════════════════════════════════════════════════════════
      # 1. WAF POLICY — mode must be "Prevention", OWASP 3.2, custom rules
      # ═══════════════════════════════════════════════════════════════════════
      - name: "Check 1/10: WAF Policy mode + ruleset"
        id: check-waf
        continue-on-error: true
        run: |
          RG="${{ env.AZURE_RG }}"
          WAF_NAME="${{ env.WAF_POLICY_NAME }}"
          DRIFT="${{ env.DRIFT_COUNT }}"
          REM="${{ env.REMEDIATED_COUNT }}"

          echo "--- WAF Policy: $WAF_NAME ---"

          MODE=$(az network application-gateway waf-policy show \
            --name "$WAF_NAME" --resource-group "$RG" \
            --query "properties.policySettings.mode" -o tsv 2>/dev/null || echo "NOT_FOUND")

          if [ "$MODE" = "NOT_FOUND" ]; then
            echo "DRIFT: WAF policy not found!"
            DRIFT=$((DRIFT + 1))
          elif [ "$MODE" = "Prevention" ]; then
            echo "OK: WAF mode is Prevention"
          else
            echo "DRIFT: WAF mode is '$MODE' — expected 'Prevention'"
            DRIFT=$((DRIFT + 1))
            echo "REMEDIATING: Re-deploying WAF Bicep..."
            HTTP_FQDN=$(az containerapp show --name aw-http-frontend --resource-group "$RG" \
              --query properties.configuration.ingress.fqdn -o tsv 2>/dev/null || echo "")
            DASH_FQDN=$(az containerapp show --name aw-dashboard-frontend --resource-group "$RG" \
              --query properties.configuration.ingress.fqdn -o tsv 2>/dev/null || echo "")
            az deployment group create \
              --resource-group "$RG" \
              --template-file infra/afd-waf.bicep \
              --parameters \
                wafPolicyName="$WAF_NAME" \
                appGwName="${{ env.APP_GW_NAME }}" \
                location="swedencentral" \
                httpFrontendFqdn="$HTTP_FQDN" \
                dashboardFrontendFqdn="$DASH_FQDN" \
                allowedCountries='[]' \
              --output none 2>/dev/null || echo "  Remediation failed (check template)"
            REM=$((REM + 1))
            echo "  Remediation applied."
          fi

          # Check OWASP ruleset version (try both with and without properties prefix)
          RULESET=$(az network application-gateway waf-policy show \
            --name "$WAF_NAME" --resource-group "$RG" \
            --query "managedRules.managedRuleSets[0].ruleSetVersion" -o tsv 2>/dev/null || echo "")
          if [ -z "$RULESET" ]; then
            RULESET=$(az network application-gateway waf-policy show \
              --name "$WAF_NAME" --resource-group "$RG" \
              --query "properties.managedRules.managedRuleSets[0].ruleSetVersion" -o tsv 2>/dev/null || echo "")
          fi
          if [ "$RULESET" = "3.2" ]; then
            echo "OK: OWASP CRS $RULESET"
          else
            echo "DRIFT: OWASP CRS version is '$RULESET' — expected '3.2'"
            DRIFT=$((DRIFT + 1))
          fi

          echo "DRIFT_COUNT=$DRIFT" >> $GITHUB_ENV
          echo "REMEDIATED_COUNT=$REM" >> $GITHUB_ENV

      # ═══════════════════════════════════════════════════════════════════════
      # 2. APPLICATION GATEWAY — WAF_v2 SKU, running
      # ═══════════════════════════════════════════════════════════════════════
      - name: "Check 2/10: Application Gateway provisioning"
        id: check-appgw
        continue-on-error: true
        run: |
          RG="${{ env.AZURE_RG }}"
          GW_NAME="${{ env.APP_GW_NAME }}"
          DRIFT="${{ env.DRIFT_COUNT }}"

          echo "--- App Gateway: $GW_NAME ---"

          GW_ID=$(az network application-gateway show \
            --name "$GW_NAME" --resource-group "$RG" \
            --query id -o tsv 2>/dev/null || echo "NOT_FOUND")

          if [ "$GW_ID" = "NOT_FOUND" ]; then
            echo "DRIFT: App Gateway not found!"
            DRIFT=$((DRIFT + 1))
            echo "DRIFT_COUNT=$DRIFT" >> $GITHUB_ENV
            exit 0
          fi

          SKU=$(az network application-gateway show \
            --name "$GW_NAME" --resource-group "$RG" \
            --query "sku.name" -o tsv)
          if [ "$SKU" = "WAF_v2" ]; then
            echo "OK: SKU is $SKU"
          else
            echo "DRIFT: SKU is '$SKU' — expected 'WAF_v2'"
            DRIFT=$((DRIFT + 1))
          fi

          # provisioningState is at top-level in az network output, not under properties
          PROV=$(az network application-gateway show \
            --name "$GW_NAME" --resource-group "$RG" \
            --query "provisioningState" -o tsv)
          if [ -z "$PROV" ]; then
            # fallback: check under properties for older API versions
            PROV=$(az network application-gateway show \
              --name "$GW_NAME" --resource-group "$RG" \
              --query "properties.provisioningState" -o tsv)
          fi
          if [ "$PROV" = "Succeeded" ]; then
            echo "OK: Provisioning state = Succeeded"
          else
            echo "DRIFT: Provisioning state = '$PROV'"
            DRIFT=$((DRIFT + 1))
          fi

          CAP=$(az network application-gateway show \
            --name "$GW_NAME" --resource-group "$RG" \
            --query "sku.capacity" -o tsv)
          if [ "$CAP" = "2" ]; then
            echo "OK: Capacity = $CAP"
          else
            echo "DRIFT: Capacity is $CAP — expected 2"
            DRIFT=$((DRIFT + 1))
          fi

          # Check frontend port 80 is present
          PORT80=$(az network application-gateway frontend-port show \
            --gateway-name "$GW_NAME" --resource-group "$RG" \
            --name "port-80" --query "port" -o tsv 2>/dev/null || echo "MISSING")
          if [ "$PORT80" = "80" ]; then
            echo "OK: Frontend port 80 present"
          else
            echo "DRIFT: Frontend port 80 missing"
            DRIFT=$((DRIFT + 1))
          fi

          echo "DRIFT_COUNT=$DRIFT" >> $GITHUB_ENV

      # ═══════════════════════════════════════════════════════════════════════
      # 3. CONTAINER APPS — all 6 must be provisioned + correct ingress
      # ═══════════════════════════════════════════════════════════════════════
      - name: "Check 3/10: Container Apps provisioning + ingress"
        id: check-acas
        continue-on-error: true
        run: |
          RG="${{ env.AZURE_RG }}"
          DRIFT="${{ env.DRIFT_COUNT }}"

          echo "--- Container Apps ---"

          # Map of service -> expected external setting
          declare -A EXPECTED_EXTERNAL
          EXPECTED_EXTERNAL[aw-sandbox-store]="false"
          EXPECTED_EXTERNAL[aw-ai-engine]="false"
          EXPECTED_EXTERNAL[aw-dashboard-backend]="false"
          EXPECTED_EXTERNAL[aw-ssh-frontend]="true"
          EXPECTED_EXTERNAL[aw-http-frontend]="true"
          EXPECTED_EXTERNAL[aw-dashboard-frontend]="true"

          for APP in aw-sandbox-store aw-ai-engine aw-dashboard-backend \
                     aw-ssh-frontend aw-http-frontend aw-dashboard-frontend; do
            echo "  Checking $APP..."

            STATUS=$(az containerapp show --name "$APP" --resource-group "$RG" \
              --query "properties.provisioningState" -o tsv 2>/dev/null || echo "NOT_FOUND")

            if [ "$STATUS" = "NOT_FOUND" ]; then
              echo "  DRIFT: $APP not found!"
              DRIFT=$((DRIFT + 1))
              continue
            fi

            if [ "$STATUS" = "Succeeded" ]; then
              echo "  OK: Provisioned"
            else
              echo "  DRIFT: $APP provisioning state = $STATUS"
              DRIFT=$((DRIFT + 1))
            fi

            # Check ingress external setting
            EXTERNAL=$(az containerapp show --name "$APP" --resource-group "$RG" \
              --query "properties.configuration.ingress.external" -o tsv 2>/dev/null || echo "unknown")
            EXPECTED="${EXPECTED_EXTERNAL[$APP]}"

            if [ "$EXTERNAL" = "$EXPECTED" ]; then
              echo "  OK: Ingress external=$EXTERNAL"
            else
              echo "  DRIFT: $APP ingress.external=$EXTERNAL (expected $EXPECTED)"
              DRIFT=$((DRIFT + 1))
            fi

            # Check Azure Files mount still exists
            MOUNT=$(az containerapp show --name "$APP" --resource-group "$RG" \
              --query "properties.template.volumes[0].storageType" -o tsv 2>/dev/null || echo "")
            if [ "$MOUNT" = "AzureFile" ]; then
              echo "  OK: AzureFile mount present"
            else
              echo "  WARN: $APP AzureFile mount check skipped (may not apply to all)"
            fi
          done

          echo "DRIFT_COUNT=$DRIFT" >> $GITHUB_ENV

      # ═══════════════════════════════════════════════════════════════════════
      # 4. LOG ANALYTICS — retention must be 365 days
      # ═══════════════════════════════════════════════════════════════════════
      - name: "Check 4/10: Log Analytics workspace retention"
        id: check-loganalytics
        continue-on-error: true
        run: |
          RG="${{ env.AZURE_RG }}"
          LA_NAME="${{ secrets.AZURE_LOG_ANALYTICS }}"
          DRIFT="${{ env.DRIFT_COUNT }}"
          REM="${{ env.REMEDIATED_COUNT }}"

          echo "--- Log Analytics: $LA_NAME ---"

          if [ -z "$LA_NAME" ]; then
            echo "SKIP: AZURE_LOG_ANALYTICS not set"
            exit 0
          fi

          RETENTION=$(az monitor log-analytics workspace show \
            --resource-group "$RG" --workspace-name "$LA_NAME" \
            --query "retentionInDays" -o tsv 2>/dev/null || echo "NOT_FOUND")

          if [ "$RETENTION" = "NOT_FOUND" ]; then
            echo "DRIFT: Log Analytics workspace not found"
            exit 0
          fi

          if [ "$RETENTION" = "365" ]; then
            echo "OK: Retention = $RETENTION days"
          else
            echo "DRIFT: Retention = $RETENTION days — expected 365"
            DRIFT=$((DRIFT + 1))
            echo "REMEDIATING: Setting retention to 365..."
            az monitor log-analytics workspace update \
              --resource-group "$RG" --workspace-name "$LA_NAME" \
              --retention-time 365 --output none 2>/dev/null || true
            REM=$((REM + 1))
            echo "  Remediation applied."
          fi

          echo "DRIFT_COUNT=$DRIFT" >> $GITHUB_ENV
          echo "REMEDIATED_COUNT=$REM" >> $GITHUB_ENV

      # ═══════════════════════════════════════════════════════════════════════
      # 5. STORAGE ACCOUNT — diagnostic settings must exist with 365d retention
      # ═══════════════════════════════════════════════════════════════════════
      - name: "Check 5/10: Storage Account diagnostic settings"
        id: check-storage-diag
        continue-on-error: true
        run: |
          RG="${{ env.AZURE_RG }}"
          STORAGE="${{ env.STORAGE_ACCOUNT }}"
          LA_NAME="${{ secrets.AZURE_LOG_ANALYTICS }}"
          DRIFT="${{ env.DRIFT_COUNT }}"
          REM="${{ env.REMEDIATED_COUNT }}"

          echo "--- Storage Account: $STORAGE ---"

          if [ -z "$STORAGE" ]; then
            echo "SKIP: STORAGE_ACCOUNT not set"
            exit 0
          fi

          # Check diagnostic setting exists
          STORAGE_ID=$(az storage account show --name "$STORAGE" --resource-group "$RG" \
            --query id -o tsv 2>/dev/null || echo "")
          if [ -z "$STORAGE_ID" ]; then
            echo "DRIFT: Storage account not found"
            exit 0
          fi

          DIAG_EXISTS=$(az monitor diagnostic-settings list \
            --resource "$STORAGE_ID" \
            --query "[?name=='aw-compliance-diag'].name" -o tsv 2>/dev/null || echo "")

          if [ -n "$DIAG_EXISTS" ]; then
            echo "OK: Diagnostic setting 'aw-compliance-diag' exists"
          else
            echo "DRIFT: Diagnostic setting 'aw-compliance-diag' missing"
            DRIFT=$((DRIFT + 1))

            LA_ID=$(az monitor log-analytics workspace show \
              --resource-group "$RG" --workspace-name "$LA_NAME" \
              --query id -o tsv 2>/dev/null || echo "")
            if [ -n "$LA_ID" ]; then
              echo "REMEDIATING: Creating diagnostic setting..."
              az monitor diagnostic-settings create \
                --name "aw-compliance-diag" \
                --resource "$STORAGE_ID" \
                --workspace "$LA_ID" \
                --logs '[{"category":"StorageRead","enabled":true,"retentionPolicy":{"enabled":true,"days":365}},{"category":"StorageWrite","enabled":true,"retentionPolicy":{"enabled":true,"days":365}},{"category":"StorageDelete","enabled":true,"retentionPolicy":{"enabled":true,"days":365}}]' \
                --metrics '[{"category":"Transaction","enabled":true,"retentionPolicy":{"enabled":true,"days":365}}]' \
                --output none 2>/dev/null || true
              REM=$((REM + 1))
              echo "  Remediation applied."
            fi
          fi

          echo "DRIFT_COUNT=$DRIFT" >> $GITHUB_ENV
          echo "REMEDIATED_COUNT=$REM" >> $GITHUB_ENV

      # ═══════════════════════════════════════════════════════════════════════
      # 6. KEY VAULT — diagnostic settings + soft-delete + purge protection
      # ═══════════════════════════════════════════════════════════════════════
      - name: "Check 6/10: Key Vault audit + protection"
        id: check-keyvault
        continue-on-error: true
        run: |
          RG="${{ env.AZURE_RG }}"
          KV_NAME="${{ secrets.KEY_VAULT }}"
          LA_NAME="${{ secrets.AZURE_LOG_ANALYTICS }}"
          DRIFT="${{ env.DRIFT_COUNT }}"
          REM="${{ env.REMEDIATED_COUNT }}"

          echo "--- Key Vault: $KV_NAME ---"

          if [ -z "$KV_NAME" ]; then
            echo "SKIP: KEY_VAULT not set"
            exit 0
          fi

          KV_ID=$(az keyvault show --name "$KV_NAME" --resource-group "$RG" \
            --query id -o tsv 2>/dev/null || echo "")

          if [ -z "$KV_ID" ]; then
            echo "DRIFT: Key Vault not found"
            exit 0
          fi

          # Check soft-delete
          SOFT_DELETE=$(az keyvault show --name "$KV_NAME" --resource-group "$RG" \
            --query "properties.enableSoftDelete" -o tsv 2>/dev/null || echo "unknown")
          if [ "$SOFT_DELETE" = "true" ]; then
            echo "OK: Soft-delete enabled"
          else
            echo "DRIFT: Soft-delete = $SOFT_DELETE — expected true"
            DRIFT=$((DRIFT + 1))
          fi

          # Check purge protection
          PURGE_PROT=$(az keyvault show --name "$KV_NAME" --resource-group "$RG" \
            --query "properties.enablePurgeProtection" -o tsv 2>/dev/null || echo "unknown")
          if [ "$PURGE_PROT" = "true" ]; then
            echo "OK: Purge protection enabled"
          else
            echo "DRIFT: Purge protection = $PURGE_PROT — expected true"
            DRIFT=$((DRIFT + 1))
          fi

          # Check diagnostic setting
          DIAG_EXISTS=$(az monitor diagnostic-settings list \
            --resource "$KV_ID" \
            --query "[?name=='aw-compliance-diag'].name" -o tsv 2>/dev/null || echo "")
          if [ -n "$DIAG_EXISTS" ]; then
            echo "OK: Diagnostic setting exists"
          else
            echo "DRIFT: Diagnostic setting missing"
            DRIFT=$((DRIFT + 1))

            LA_ID=$(az monitor log-analytics workspace show \
              --resource-group "$RG" --workspace-name "$LA_NAME" \
              --query id -o tsv 2>/dev/null || echo "")
            if [ -n "$LA_ID" ]; then
              echo "REMEDIATING: Creating Key Vault diagnostic setting..."
              az monitor diagnostic-settings create \
                --name "aw-compliance-diag" \
                --resource "$KV_ID" \
                --workspace "$LA_ID" \
                --logs '[{"category":"AuditEvent","enabled":true,"retentionPolicy":{"enabled":true,"days":365}}]' \
                --metrics '[{"category":"AllMetrics","enabled":true,"retentionPolicy":{"enabled":true,"days":365}}]' \
                --output none 2>/dev/null || true
              REM=$((REM + 1))
              echo "  Remediation applied."
            fi
          fi

          echo "DRIFT_COUNT=$DRIFT" >> $GITHUB_ENV
          echo "REMEDIATED_COUNT=$REM" >> $GITHUB_ENV

      # ═══════════════════════════════════════════════════════════════════════
      # 7. ACA ENVIRONMENT — linked to Log Analytics, no drift
      # ═══════════════════════════════════════════════════════════════════════
      - name: "Check 7/10: ACA Environment Log Analytics linkage"
        id: check-aca-env
        continue-on-error: true
        run: |
          RG="${{ env.AZURE_RG }}"
          ACA_ENV="${{ env.AZURE_ACA_ENV }}"
          LA_NAME="${{ secrets.AZURE_LOG_ANALYTICS }}"
          DRIFT="${{ env.DRIFT_COUNT }}"

          echo "--- ACA Environment: $ACA_ENV ---"

          ENV_ID=$(az containerapp env show --name "$ACA_ENV" --resource-group "$RG" \
            --query id -o tsv 2>/dev/null || echo "NOT_FOUND")

          if [ "$ENV_ID" = "NOT_FOUND" ]; then
            echo "DRIFT: ACA Environment not found"
            exit 0
          fi

          echo "OK: ACA Environment exists"

          # Check Log Analytics workspace is linked
          LA_LINKED=$(az containerapp env show --name "$ACA_ENV" --resource-group "$RG" \
            --query "properties.appLogsConfiguration.logAnalyticsConfiguration.customerId" -o tsv 2>/dev/null || echo "")

          if [ -n "$LA_LINKED" ]; then
            echo "OK: Linked to Log Analytics: $LA_LINKED"
          else
            echo "DRIFT: No Log Analytics linked to ACA Environment"
            DRIFT=$((DRIFT + 1))
          fi

          echo "DRIFT_COUNT=$DRIFT" >> $GITHUB_ENV

      # ═══════════════════════════════════════════════════════════════════════
      # 8. DEFENDER FOR CLOUD — pricing plans must be active
      # ═══════════════════════════════════════════════════════════════════════
      - name: "Check 8/10: Defender for Cloud pricing plans"
        id: check-defender
        continue-on-error: true
        run: |
          DRIFT="${{ env.DRIFT_COUNT }}"
          REM="${{ env.REMEDIATED_COUNT }}"

          echo "--- Defender for Cloud ---"

          for PLAN in CloudPosture Containers StorageAccounts KeyVaults; do
            TIER=$(az security pricing show --name "$PLAN" \
              --query "pricingTier" -o tsv 2>/dev/null || echo "NOT_FOUND")

            if [ "$TIER" = "Standard" ]; then
              echo "OK: $PLAN = Standard"
            elif [ "$TIER" = "NOT_FOUND" ]; then
              echo "INFO: $PLAN not available at this scope (requires subscription owner)"
            else
              echo "DRIFT: $PLAN = $TIER — expected Standard"
              DRIFT=$((DRIFT + 1))
              echo "REMEDIATING: Enabling $PLAN..."
              az security pricing create --name "$PLAN" --pricing-tier "Standard" 2>/dev/null || true
              REM=$((REM + 1))
              echo "  Remediation attempted."
            fi
          done

          echo "DRIFT_COUNT=$DRIFT" >> $GITHUB_ENV
          echo "REMEDIATED_COUNT=$REM" >> $GITHUB_ENV

      # ═══════════════════════════════════════════════════════════════════════
      # 9. CONTAINER REGISTRY — admin-enabled, reachable
      # ═══════════════════════════════════════════════════════════════════════
      - name: "Check 9/10: Container Registry status"
        id: check-acr
        continue-on-error: true
        run: |
          RG="${{ env.AZURE_RG }}"
          ACR="${{ env.ACR_NAME }}"
          DRIFT="${{ env.DRIFT_COUNT }}"
          REM="${{ env.REMEDIATED_COUNT }}"

          echo "--- Container Registry: $ACR ---"

          ACR_EXISTS=$(az acr show --name "$ACR" --resource-group "$RG" \
            --query name -o tsv 2>/dev/null || echo "")

          if [ -z "$ACR_EXISTS" ]; then
            echo "DRIFT: ACR not found"
            DRIFT=$((DRIFT + 1))
            echo "DRIFT_COUNT=$DRIFT" >> $GITHUB_ENV
            exit 0
          fi

          echo "OK: ACR exists"

          # Check admin-enabled
          ADMIN=$(az acr show --name "$ACR" --resource-group "$RG" \
            --query "adminUserEnabled" -o tsv 2>/dev/null || echo "false")
          if [ "$ADMIN" = "true" ]; then
            echo "OK: Admin enabled"
          else
            echo "DRIFT: Admin = $ADMIN — expected true"
            DRIFT=$((DRIFT + 1))
            echo "REMEDIATING: Enabling admin..."
            az acr update --name "$ACR" --resource-group "$RG" \
              --admin-enabled true --output none 2>/dev/null || true
            REM=$((REM + 1))
            echo "  Remediation applied."
          fi

          # Check login server is accessible
          LOGIN_SERVER=$(az acr show --name "$ACR" --resource-group "$RG" \
            --query "loginServer" -o tsv 2>/dev/null || echo "")
          if [ -n "$LOGIN_SERVER" ]; then
            echo "OK: Login server = $LOGIN_SERVER"
          fi

          echo "DRIFT_COUNT=$DRIFT" >> $GITHUB_ENV
          echo "REMEDIATED_COUNT=$REM" >> $GITHUB_ENV

      # ═══════════════════════════════════════════════════════════════════════
      # 10. LOG ANALYTICS TABLE RETENTION — AzureActivity + ContainerAppLogs
      # ═══════════════════════════════════════════════════════════════════════
      - name: "Check 10/10: Log Analytics table retention"
        id: check-la-tables
        continue-on-error: true
        run: |
          RG="${{ env.AZURE_RG }}"
          LA_NAME="${{ secrets.AZURE_LOG_ANALYTICS }}"
          DRIFT="${{ env.DRIFT_COUNT }}"
          REM="${{ env.REMEDIATED_COUNT }}"

          echo "--- Log Analytics Tables ---"

          if [ -z "$LA_NAME" ]; then
            echo "SKIP: AZURE_LOG_ANALYTICS not set"
            exit 0
          fi

          for TABLE in AzureActivity; do
            RETENTION=$(az monitor log-analytics workspace table show \
              --resource-group "$RG" --workspace-name "$LA_NAME" \
              --name "$TABLE" --query "retentionInDays" -o tsv 2>/dev/null || echo "")

            if [ "$RETENTION" = "365" ]; then
              echo "OK: $TABLE retention = $RETENTION days"
            else
              echo "DRIFT: $TABLE retention = $RETENTION — expected 365"
              DRIFT=$((DRIFT + 1))
            fi
          done

          for TABLE in ContainerAppConsoleLogs; do
            RETENTION=$(az monitor log-analytics workspace table show \
              --resource-group "$RG" --workspace-name "$LA_NAME" \
              --name "$TABLE" --query "retentionInDays" -o tsv 2>/dev/null || echo "")
            if [ "$RETENTION" = "90" ]; then
              echo "OK: $TABLE retention = $RETENTION days"
            else
              echo "DRIFT: $TABLE retention = $RETENTION — expected 90"
              DRIFT=$((DRIFT + 1))
            fi
          done

          echo "DRIFT_COUNT=$DRIFT" >> $GITHUB_ENV
          echo "REMEDIATED_COUNT=$REM" >> $GITHUB_ENV

      # ═══════════════════════════════════════════════════════════════════════
      # GENERATE DRIFT REPORT + UPLOAD TO STORAGE
      # ═══════════════════════════════════════════════════════════════════════
      - name: Generate drift report and upload to Azure Storage
        id: drift-report
        continue-on-error: true
        run: |
          RG="${{ env.AZURE_RG }}"
          STORAGE="${{ env.STORAGE_ACCOUNT }}"
          DRIFT="${{ env.DRIFT_COUNT }}"
          REM="${{ env.REMEDIATED_COUNT }}"

          # Build JSON report
          jq -n \
            --arg ts "${{ env.TIMESTAMP }}" \
            --argjson drift "$DRIFT" \
            --argjson remediated "$REM" \
            --arg commit "${{ github.sha }}" \
            --arg run "${{ github.run_id }}" \
            '{
              timestamp: $ts,
              commitSha: $commit,
              githubRunId: ($run | tonumber),
              driftDetected: ($drift > 0),
              driftCount: $drift,
              remediatedCount: $remediated,
              status: (if $drift > 0 then "DRIFT_DETECTED" else "CLEAN" end)
            }' > /tmp/drift-report.json

          cat /tmp/drift-report.json

          # Upload to Azure Storage if possible
          if [ -n "$STORAGE" ]; then
            STORAGE_KEY=$(az storage account keys list \
              --resource-group "$RG" --account-name "$STORAGE" \
              --query "[0].value" -o tsv 2>/dev/null || echo "")
            if [ -n "$STORAGE_KEY" ]; then
              az storage container create \
                --name "compliance-evidence" \
                --account-name "$STORAGE" --account-key "$STORAGE_KEY" \
                --public-access off --output none 2>/dev/null || true
              az storage blob upload \
                --account-name "$STORAGE" --account-key "$STORAGE_KEY" \
                --container-name "compliance-evidence" \
                --file /tmp/drift-report.json \
                --name "drift-report-${{ env.IMAGE_TAG }}.json" \
                --overwrite
              echo "Drift report uploaded."
            fi
          fi

      # ═══════════════════════════════════════════════════════════════════════
      # GENERATE STEP SUMMARY
      # ═══════════════════════════════════════════════════════════════════════
      - name: Generate IaC Drift Summary
        id: drift-summary
        run: |
          DRIFT="${{ env.DRIFT_COUNT }}"
          REM="${{ env.REMEDIATED_COUNT }}"

          echo "## IaC Drift Detection & Remediation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$DRIFT" -gt 0 ]; then
            echo "| Result | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Drifts Detected | $DRIFT |" >> $GITHUB_STEP_SUMMARY
            echo "| Auto-Remediated | $REM |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Action required**: $((DRIFT - REM)) drift(s) could not be auto-remediated." >> $GITHUB_STEP_SUMMARY
            echo "drift_detected=true" >> $GITHUB_OUTPUT
          else
            echo "**PASS: No drift detected** -- all Azure resources match desired state." >> $GITHUB_STEP_SUMMARY
            echo "drift_detected=false" >> $GITHUB_OUTPUT
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Checks Performed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| # | Resource | What It Checks |" >> $GITHUB_STEP_SUMMARY
          echo "|---|----------|----------------|" >> $GITHUB_STEP_SUMMARY
          echo "| 1 | WAF Policy | Mode = Prevention, OWASP CRS 3.2 |" >> $GITHUB_STEP_SUMMARY
          echo "| 2 | Application Gateway | WAF_v2 SKU, capacity 2, port 80 |" >> $GITHUB_STEP_SUMMARY
          echo "| 3 | Container Apps (6) | Provisioned, correct internal/external ingress |" >> $GITHUB_STEP_SUMMARY
          echo "| 4 | Log Analytics | Workspace retention = 365 days |" >> $GITHUB_STEP_SUMMARY
          echo "| 5 | Storage Account | Diagnostic settings present |" >> $GITHUB_STEP_SUMMARY
          echo "| 6 | Key Vault | Soft-delete, purge protection, diagnostic settings |" >> $GITHUB_STEP_SUMMARY
          echo "| 7 | ACA Environment | Linked to Log Analytics |" >> $GITHUB_STEP_SUMMARY
          echo "| 8 | Defender for Cloud | Pricing plans = Standard |" >> $GITHUB_STEP_SUMMARY
          echo "| 9 | Container Registry | Admin enabled, reachable |" >> $GITHUB_STEP_SUMMARY
          echo "| 10 | Log Analytics Tables | AzureActivity=365d, ContainerAppLogs=90d |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Report uploaded to \`compliance-evidence/drift-report-\` in Azure Storage." >> $GITHUB_STEP_SUMMARY
          cat $GITHUB_STEP_SUMMARY

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 7: WAF-ONLY — deploy/update only App Gateway WAF (skip ACA build/deploy)
# ═══════════════════════════════════════════════════════════════════════════════
  waf-only:
    name: Deploy WAF only (skip ACA)
    if: ${{ inputs.afd_only }}
    runs-on: ubuntu-latest
    concurrency: aca-deploy

    steps:
      - uses: actions/checkout@v4
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Capture ACA FQDNs
        run: |
          HTTP_FQDN=$(az containerapp show --name aw-http-frontend \
            --resource-group "${{ env.AZURE_RG }}" \
            --query properties.configuration.ingress.fqdn -o tsv 2>/dev/null || echo "")
          DASH_FQDN=$(az containerapp show --name aw-dashboard-frontend \
            --resource-group "${{ env.AZURE_RG }}" \
            --query properties.configuration.ingress.fqdn -o tsv 2>/dev/null || echo "")
          echo "HTTP_FQDN=$HTTP_FQDN" >> $GITHUB_ENV
          echo "DASH_FQDN=$DASH_FQDN" >> $GITHUB_ENV

      - name: Deploy App Gateway WAF
        env:
          ALLOWED_COUNTRIES: ${{ inputs.allowed_countries }}
        run: |
          COUNTRIES="$ALLOWED_COUNTRIES"
          if [ -z "$COUNTRIES" ]; then
            COUNTRIES_JSON="[]"
          else
            COUNTRIES_JSON=$(echo "$COUNTRIES" | awk -F, '{for(i=1;i<=NF;i++){printf "\"%s\"",$i; if(i<NF)printf ","}}' | sed 's/^/[/;s/$/]/')
          fi

          az deployment group create \
            --resource-group "${{ env.AZURE_RG }}" \
            --template-file infra/afd-waf.bicep \
            --parameters \
              wafPolicyName="${{ env.WAF_POLICY_NAME }}" \
              appGwName="${{ env.APP_GW_NAME }}" \
              location="swedencentral" \
              httpFrontendFqdn="$HTTP_FQDN" \
              dashboardFrontendFqdn="$DASH_FQDN" \
              allowedCountries="${COUNTRIES_JSON}" \
            --output none
          echo "Application Gateway WAF deployed."

      - name: Show App Gateway IP
        run: |
          GW_IP=$(az network public-ip show \
            --name "${APP_GW_NAME}-pip" \
            --resource-group "${{ env.AZURE_RG }}" \
            --query ipAddress -o tsv 2>/dev/null || echo "unavailable")
          echo "## Application Gateway WAF Deployed" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Address |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| HTTP Honeypot | http://$GW_IP |" >> $GITHUB_STEP_SUMMARY
          echo "| SOC Dashboard | http://$GW_IP |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Access both services via this IP. The App Gateway routes based on path." >> $GITHUB_STEP_SUMMARY
          cat $GITHUB_STEP_SUMMARY

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 8: VERIFY-ONLY (triggered manually via workflow_dispatch)
# Skips build + deploy, just checks the current state of all apps + Front Door
# ═══════════════════════════════════════════════════════════════════════════════
  verify:
    name: Verify Only (no deploy)
    if: ${{ inputs.verify_only }}
    runs-on: ubuntu-latest

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Check all Container Apps
        run: |
          echo "Checking provisioning state of all services..."
          ALL_OK=true
          for APP in aw-sandbox-store aw-ai-engine aw-dashboard-backend \
                     aw-ssh-frontend aw-http-frontend aw-dashboard-frontend; do
            STATUS=$(az containerapp show \
              --name "$APP" \
              --resource-group "${{ env.AZURE_RG }}" \
              --query properties.provisioningState -o tsv 2>/dev/null || echo "NOT FOUND")
            if [ "$STATUS" = "Succeeded" ]; then
              echo "  OK    $APP"
            else
              echo "  FAIL  $APP ($STATUS)"
              ALL_OK=false
            fi
          done
          if [ "$ALL_OK" = "false" ]; then exit 1; fi
          echo ""
          echo "All ACA services healthy."

      - name: Check App Gateway + WAF
        run: |
          echo "Checking Application Gateway WAF..."
          GW_OK=true

          GW_ID=$(az network application-gateway show \
            --name "${{ env.APP_GW_NAME }}" \
            --resource-group "${{ env.AZURE_RG }}" \
            --query id -o tsv 2>/dev/null || echo "NOT FOUND")
          if [ "$GW_ID" = "NOT FOUND" ]; then
            echo "  FAIL  App Gateway '${{ env.APP_GW_NAME }}' not found"
            GW_OK=false
          else
            echo "  OK    App Gateway '${{ env.APP_GW_NAME }}'"
          fi

          WAF_ID=$(az network application-gateway waf-policy show \
            --name "${{ env.WAF_POLICY_NAME }}" \
            --resource-group "${{ env.AZURE_RG }}" \
            --query id -o tsv 2>/dev/null || echo "NOT FOUND")
          if [ "$WAF_ID" = "NOT FOUND" ]; then
            echo "  FAIL  WAF policy '${{ env.WAF_POLICY_NAME }}' not found"
            GW_OK=false
          else
            echo "  OK    WAF policy '${{ env.WAF_POLICY_NAME }}'"
            az network application-gateway waf-policy show \
              --name "${{ env.WAF_POLICY_NAME }}" \
              --resource-group "${{ env.AZURE_RG }}" \
              --query "{mode:properties.policySettings.mode, rulesets:properties.managedRules.managedRuleSets[].{type:ruleSetType,version:ruleSetVersion}}" -o table
          fi

          GW_IP=$(az network public-ip show \
            --name "${APP_GW_NAME}-pip" \
            --resource-group "${{ env.AZURE_RG }}" \
            --query ipAddress -o tsv 2>/dev/null || echo "unavailable")
          echo "  App Gateway public IP: $GW_IP"

          if [ "$GW_OK" = "false" ]; then exit 1; fi
          echo ""
          echo "App Gateway + WAF healthy."
