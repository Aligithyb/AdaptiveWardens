name: Deploy AdaptiveWardens

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/AdaptiveWardens

            git pull origin main

            cat > .env << ENVEOF
            DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
            DEEPSEEK_MODEL=deepseek-chat
            DASHBOARD_PASSWORD=${{ secrets.DASHBOARD_PASSWORD }}
            SSH_PORT=2222
            HTTP_PORT=8080
            DASHBOARD_PORT=3000
            SANDBOX_API_PORT=8001
            LLM_DAILY_INPUT_TOKEN_BUDGET=50000
            LLM_DAILY_OUTPUT_TOKEN_BUDGET=20000
            ENVEOF

            docker compose build --no-cache dashboard-frontend
            docker compose up -d
            docker compose ps
