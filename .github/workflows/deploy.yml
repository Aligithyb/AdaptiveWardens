name: Deploy to Azure VM

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
  issues: write
  pull-requests: write # Recommended for ZAP to comment on PRs

jobs:
  sast:
    name: Run SAST Scanner (Semgrep)
    if: "!contains(github.event.head_commit.message, '[skip-sec]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/default p/owasp-top-ten"

  dast:
    name: Run DAST Scanner (OWASP ZAP)
    if: "!contains(github.event.head_commit.message, '[skip-sec]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Prepare environment
        run: cp .env.example .env
        
      - name: Spin up Docker Compose
        run: docker compose up -d --build
        
      - name: Wait for services
        # 20s might be too short for a full build + start. 
        # Using 40s ensures Next.js/Docker is fully responsive.
        run: sleep 40
        
      - name: Fix ZAP permissions
        run: |
          mkdir -p zap_reports
          chmod -R 777 zap_reports
          
      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3000'
          fail_action: false
          # We use a simple name here. ZAP adds its own suffix anyway.
          artifact_name: 'zap_scan_report'
          # We force ZAP to write to our shared folder
          cmd_options: '-I -r report.html -w report.md'
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug sandbox logs
        if: always()
        run: |
          docker logs honeypot-sandbox || echo "No logs found"

  deploy:
    name: Deploy to Azure
    needs: [sast, dast]
    if: "always() && (needs.sast.result == 'success' || needs.sast.result == 'skipped') && (needs.dast.result == 'success' || needs.dast.result == 'skipped')"
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script_stop: true
          script: |
            cd /home/azureuser/honeypot/AdaptiveWardens
            git pull origin main
            docker compose up --build -d
            docker image prune -f
