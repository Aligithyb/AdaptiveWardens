name: Deploy to Azure VM

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sast:
    name: Run SAST Scanner (Semgrep)
    if: "!contains(github.event.head_commit.message, '[skip-sec]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/default p/owasp-top-ten"

  dast:
    name: Run DAST Scanner (OWASP ZAP)
    if: "!contains(github.event.head_commit.message, '[skip-sec]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Prepare environment
        run: cp .env.example .env
      - name: Spin up Docker Compose
        run: docker compose up -d --build
      - name: Wait for services
        run: sleep 20
      - name: Debug sandbox logs
        if: always()
        run: |
          docker logs honeypot-sandbox
          docker inspect honeypot-sandbox --format='{{json .State.Health}}'
      - name: Fix ZAP permissions
        run: |
          touch zap.yaml
          chmod a+rw zap.yaml
      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3000'
          fail_action: false
          cmd_options: '-I'
          # This connects the tool to your repo's internal permissions
          token: ${{ secrets.GITHUB_TOKEN }} 
        env:
          # This ensures the underlying engine can talk to GitHub
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy to Azure
    needs: [sast, dast]
    if: "always() && (needs.sast.result == 'success' || needs.sast.result == 'skipped') && (needs.dast.result == 'success' || needs.dast.result == 'skipped')"
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script_stop: true
          script: |
            cd /home/azureuser/honeypot/AdaptiveWardens
            git pull origin main
            docker compose up --build -d
            docker image prune -f
