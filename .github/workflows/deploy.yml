name: Deploy AdaptiveWardens

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/AdaptiveWardens
            # Force the box to exactly match the (possibly rewritten) remote main.
            # A plain `git pull` fails on diverged history and silently leaves old code.
            git fetch origin main
            git reset --hard origin/main
            # Free disk so a clean image rebuild doesn't fail on a small instance
            docker system prune -f || true
            cat > .env << ENVEOF
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }}
            SLACK_BOT_TOKEN=${{ secrets.SLACK_BOT_TOKEN }}
            SLACK_CHANNEL=${{ secrets.SLACK_CHANNEL }}
            VIRUSTOTAL_API_KEY=${{ secrets.VIRUSTOTAL_API_KEY }}
            ABUSEIPDB_API_KEY=${{ secrets.ABUSEIPDB_API_KEY }}
            DASHBOARD_PASSWORD=${{ secrets.DASHBOARD_PASSWORD }}
            SESSION_SECRET=${{ secrets.SESSION_SECRET }}
            SSH_PORT=2222
            HTTP_PORT=8080
            DASHBOARD_PORT=3000
            SANDBOX_API_PORT=8001
            LOG_LEVEL=INFO
            MAX_SESSIONS=50
            SESSION_TIMEOUT=1800
            ENABLE_RATE_LIMITING=true
            NEXT_PUBLIC_API_URL=http://18.207.156.94:8003
            ENVEOF
            # With no source bind-mount on the frontend, a normal build picks up
            # new code via Docker's COPY-layer cache busting (fast, low disk).
            docker compose build
            docker compose up -d --remove-orphans --force-recreate
            docker image prune -f || true
            docker compose ps
