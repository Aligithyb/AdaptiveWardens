version: '3.8'

services:
  sandbox-store:
    build: ./sandbox-store
    container_name: app-state-store
    volumes:
      - sandbox-data:/data
    networks:
      - prod-internal
      - dmz
    environment:
      - PYTHONUNBUFFERED=1
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_CHANNEL=${SLACK_CHANNEL}
      - CANARY_AWS_ACCESS_KEY=${CANARY_AWS_ACCESS_KEY}
      - CANARY_AWS_SECRET_KEY=${CANARY_AWS_SECRET_KEY}
      - CANARY_STRIPE_KEY=${CANARY_STRIPE_KEY}
      - CANARY_DNS_HOSTNAME=${CANARY_DNS_HOSTNAME}
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import requests; requests.get('http://localhost:8001/health')" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  ai-engine:
    build: ./ai-engine
    container_name: inference-svc
    networks:
      - prod-internal
      - dmz
    volumes:
      - ./ai-engine/src:/app
      - sandbox-data:/data
    environment:
      - PYTHONUNBUFFERED=1
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-v4-flash}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - LLM_DAILY_INPUT_TOKEN_BUDGET=${LLM_DAILY_INPUT_TOKEN_BUDGET:-50000}
      - LLM_DAILY_OUTPUT_TOKEN_BUDGET=${LLM_DAILY_OUTPUT_TOKEN_BUDGET:-20000}
      - LLM_PER_IP_RATE_LIMIT_CALLS=${LLM_PER_IP_RATE_LIMIT_CALLS:-30}
      - LLM_PER_IP_RATE_LIMIT_WINDOW=${LLM_PER_IP_RATE_LIMIT_WINDOW:-60}
      - SANDBOX_URL=http://sandbox-store:8001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      sandbox-store:
        condition: service_healthy

  ssh-frontend:
    build: ./ssh-frontend
    container_name: auth-gateway
    ports:
      - "2222:2222"
    networks:
      - prod-internal
      - dmz
    volumes:
      - ./ssh-frontend/src/ssh_server.py:/app/ssh_server.py
      - sandbox-data:/data
    environment:
      - SANDBOX_URL=http://sandbox-store:8001
      - AI_ENGINE_URL=http://ai-engine:8002
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "echo 'x' > /dev/tcp/localhost/2222 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      sandbox-store:
        condition: service_healthy
      ai-engine:
        condition: service_started

  http-frontend:
    build: ./http-frontend
    container_name: web-gateway
    ports:
      - "8080:8080"
    networks:
      - prod-internal
      - dmz
    volumes:
      - ./http-frontend/src:/app
    environment:
      - SANDBOX_URL=http://sandbox-store:8001
      - AI_ENGINE_URL=http://ai-engine:8002
      - PYTHONUNBUFFERED=1
      - HTTP_SESSION_WINDOW=${HTTP_SESSION_WINDOW:-300}
      - HTTP_MAX_CMDS_PER_SESSION=${HTTP_MAX_CMDS_PER_SESSION:-60}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "echo 'x' > /dev/tcp/localhost/8080 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      sandbox-store:
        condition: service_healthy
      ai-engine:
        condition: service_started

  dashboard-backend:
    build: ./dashboard-backend
    container_name: dashboard-backend-svc
    ports:
      - "8003:8003"
    networks:
      - prod-internal
      - dmz
    volumes:
      - sandbox-data:/data
      - ./dashboard-backend/src:/app
    environment:
      - DB_PATH=/data/app_state.db
      - PYTHONUNBUFFERED=1
      - AI_ENGINE_URL=http://ai-engine:8002
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY:-}
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY:-}
      - ANYRUN_API_KEY=${ANYRUN_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8003/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      sandbox-store:
        condition: service_healthy
      ai-engine:
        condition: service_started

  dashboard-frontend:
    build: ./dashboard-frontend
    container_name: soc-dashboard
    ports:
      - "3000:3000"
    networks:
      - prod-internal
      - dmz
    volumes:
      - ./dashboard-frontend:/app
      - /app/node_modules # Don't overwrite node_modules with host ones
    environment:
      - NODE_ENV=production
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:?Set DASHBOARD_PASSWORD in .env}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8003}
      - BACKEND_URL=http://dashboard-backend:8003
      - SESSION_SECRET=${SESSION_SECRET:?Set SESSION_SECRET in .env}
    restart: unless-stopped
    depends_on:
      - dashboard-backend
      - sandbox-store

networks:
  prod-internal:
    driver: bridge
    internal: true
  dmz:
    driver: bridge

volumes:
  sandbox-data:
