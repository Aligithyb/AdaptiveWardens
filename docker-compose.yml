version: '3.8'

services:
  sandbox-store:
    build: ./sandbox-store
    container_name: honeypot-sandbox
    volumes:
      - sandbox-data:/data
    networks:
      - honeypot-internal
      - honeypot-external
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_CHANNEL=${SLACK_CHANNEL}
      - CANARY_AWS_ACCESS_KEY=${CANARY_AWS_ACCESS_KEY}
      - CANARY_AWS_SECRET_KEY=${CANARY_AWS_SECRET_KEY}
      - CANARY_STRIPE_KEY=${CANARY_STRIPE_KEY}
      - CANARY_DNS_HOSTNAME=${CANARY_DNS_HOSTNAME}
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import requests; requests.get('http://localhost:8001/health')" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  ai-engine:
    build: ./ai-engine
    container_name: honeypot-ai
    networks:
      - honeypot-internal
      - honeypot-external
    ports:
      - "8002:8002"
    volumes:
      - ./ai-engine/src:/app
    environment:
      - PYTHONUNBUFFERED=1
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SANDBOX_URL=http://sandbox-store:8001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      sandbox-store:
        condition: service_healthy

  ssh-frontend:
    build: ./ssh-frontend
    container_name: honeypot-ssh
    ports:
      - "2222:2222"
    networks:
      - honeypot-internal
      - honeypot-external
    volumes:
      - ./ssh-frontend/src/ssh_server.py:/app/ssh_server.py
    environment:
      - SANDBOX_URL=http://sandbox-store:8001
      - AI_ENGINE_URL=http://ai-engine:8002
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "echo 'x' > /dev/tcp/localhost/2222 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      sandbox-store:
        condition: service_healthy
      ai-engine:
        condition: service_started

  http-frontend:
    build: ./http-frontend
    container_name: honeypot-http
    ports:
      - "8080:8080"
    networks:
      - honeypot-internal
      - honeypot-external
    volumes:
      - ./http-frontend/src:/app
    environment:
      - SANDBOX_URL=http://sandbox-store:8001
      - AI_ENGINE_URL=http://ai-engine:8002
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "echo 'x' > /dev/tcp/localhost/8080 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      sandbox-store:
        condition: service_healthy
      ai-engine:
        condition: service_started

  dashboard-backend:
    build: ./dashboard-backend
    container_name: honeypot-dashboard-backend
    ports:
      - "8003:8003"
    networks:
      - honeypot-internal
      - honeypot-external
    volumes:
      - sandbox-data:/data
      - ./dashboard-backend/src:/app
    environment:
      - DB_PATH=/data/honeypot.db
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8003/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      sandbox-store:
        condition: service_healthy

  dashboard-frontend:
    build: ./dashboard-frontend
    container_name: honeypot-dashboard
    ports:
      - "3000:3000"
    networks:
      - honeypot-internal
      - honeypot-external
    volumes:
      - ./dashboard-frontend:/app
      - /app/node_modules # Don't overwrite node_modules with host ones
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    depends_on:
      - dashboard-backend
      - sandbox-store

networks:
  honeypot-internal:
    driver: bridge
    internal: true
  honeypot-external:
    driver: bridge

volumes:
  sandbox-data:
